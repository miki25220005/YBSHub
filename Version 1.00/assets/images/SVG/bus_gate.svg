<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Ground Line -->
  <line x1="5" y1="88" x2="95" y2="88" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round" />

  <!-- Define Mesh Pattern for Back Wall -->
  <defs>
    <pattern id="mesh" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 4 M 0 0 L 4 4" stroke="#6b7280" stroke-width="0.5" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Back Mesh Wall (Left to Mid) -->
  <rect x="15" y="26" width="39" height="48" fill="#e5e7eb" fill-opacity="0.3" />
  <rect x="15" y="26" width="39" height="48" fill="url(#mesh)" />

  <!-- Base Plates for Pillars -->
  <rect x="10" y="86" width="8" height="3" rx="1" fill="#111827" />
  <rect x="51" y="86" width="8" height="3" rx="1" fill="#111827" />
  <rect x="72" y="86" width="8" height="3" rx="1" fill="#111827" />
  <rect x="86" y="86" width="8" height="3" rx="1" fill="#111827" />

  <!-- Left Pillar -->
  <rect x="12" y="24" width="4" height="64" fill="#1f2937" rx="0.5" />
  
  <!-- Mid Pillar -->
  <rect x="53" y="24" width="4" height="64" fill="#1f2937" rx="0.5" />
  
  <!-- Right Pillar (Left edge of Ad Box) -->
  <rect x="74" y="24" width="4" height="64" fill="#1f2937" rx="0.5" />
  <!-- Far Right Pillar (Right edge of Ad Box) -->
  <rect x="88" y="24" width="4" height="64" fill="#1f2937" rx="0.5" />

  <!-- Ad Box (Right Side) -->
  <rect x="74" y="32" width="18" height="46" fill="#1f2937" />
  <!-- Ad Box Screen/Poster (White) -->
  <rect x="76" y="35" width="14" height="40" fill="#ffffff" />
  <!-- Subtle glass reflection on the poster -->
  <polygon points="76,35 86,35 76,48" fill="#bae6fd" opacity="0.3" />

  <!-- Bench Setup -->
  <!-- Bench Legs -->
  <rect x="22" y="70" width="3" height="12" fill="#1f2937" />
  <rect x="45" y="70" width="3" height="12" fill="#1f2937" />
  <!-- Bench Seat -->
  <rect x="18" y="68" width="34" height="4" rx="2" fill="#111827" />
  <!-- Curved Armrests (Distinctive feature from the photo) -->
  <path d="M 22 68 C 22 56, 28 56, 28 68" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M 32 68 C 32 56, 38 56, 38 68" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M 42 68 C 42 56, 48 56, 48 68" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Roof Structure -->
  <!-- Sub-roof (glass/metal paneling) -->
  <rect x="12" y="24" width="80" height="2" fill="#9ca3af" />
  <!-- Main Roof (Thick black slab) -->
  <rect x="8" y="16" width="88" height="8" rx="1" fill="#111827" />
  <!-- Roof highlight for a sleek 3D metallic edge feel -->
  <rect x="8" y="16" width="88" height="2" rx="1" fill="#4b5563" opacity="0.6" />
</svg>
