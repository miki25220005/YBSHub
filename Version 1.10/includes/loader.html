<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/images/Logo/YBS_Web_Logo.png">
    <style>
        * { box-sizing: border-box; }

        /* Loading Screen Container */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
        }

        /* Loader Text */
        .loader-text {
            width: fit-content;
            font-weight: bold;
            font-family: Helvetica, Arial, sans-serif;
            white-space: pre;
            font-size: 24px;
            line-height: 2em; /* More space between lines */
            height: 1.8em;
            overflow: hidden;
            margin-top: 10px; /* Space above the text, below the bus */
        }

        /* Animated Multi-Language Text */
        .loader-text:before {
            content: "Loading...\Aဖွင့်နေသည်...\A로딩 중...\Aロード中...\A載入中...";
            white-space: pre;
            display: inline-block;
            animation: loadingText 2.5s infinite steps(5) alternate; /* Slower speed */
        }

        /* Text Animation */
        @keyframes loadingText {
            100% { transform: translateY(-100%); }
        }

        /* Loader Container */
        .loader {
            width: fit-content;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bus Wrapper */
        .busWrapper {
            width: 200px;
            height: 100px;
            display: flex;
            flex-direction: column;
            position: relative;
            align-items: center;
            justify-content: flex-end;
            overflow-x: hidden;
        }

        /* Bus Body */
        .busBody {
            width: 150px;
            height: fit-content;
            margin-bottom: 6px;
            animation: motion 1s linear infinite;
        }

        /* Bus Suspension Animation */
        @keyframes motion {
            0% { transform: translateY(0px); }
            50% { transform: translateY(3px); }
            100% { transform: translateY(0px); }
        }

        /* Bus Tires */
        .busTires {
            width: 130px;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0px 10px 0px 15px;
            position: absolute;
            bottom: 0;
        }

        .busTires svg {
            width: 24px;
            height: 24px;
            display: block;
        }

        /* Road */
        .road {
            width: 100%;
            height: 1.5px;
            background-color: #282828;
            position: relative;
            bottom: 0;
            align-self: flex-end;
            border-radius: 3px;
        }

        .road::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 100%;
            background-color: #282828;
            right: -50%;
            border-radius: 3px;
            animation: roadAnimation 1.4s linear infinite;
            border-left: 10px solid white;
        }

        .road::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 100%;
            background-color: #282828;
            right: -65%;
            border-radius: 3px;
            animation: roadAnimation 1.4s linear infinite;
            border-left: 4px solid white;
        }

        /* Lamp Post */
        .lampPost {
            position: absolute;
            bottom: 0;
            right: -90%;
            height: 90px;
            animation: roadAnimation 1.4s linear infinite;
        }

        @keyframes roadAnimation {
            0% { transform: translateX(0px); }
            100% { transform: translateX(-350px); }
        }

        /* Fade out effect when loaded */
        .hide {
            opacity: 0;
            transition: opacity 0.7s ease-out;
            pointer-events: none;
        }
    </style>
</head>

        <p class="text-2xl font-semi-bold text-gray-800 mb-4"><b>YBS Hub</b></p>
    </div>

    <script>
        // Hide the loading screen after the page is fully loaded
        window.onload = function() {
            setTimeout(() => {
                const loadingScreen = document.getElementById("loading-screen");
                if (loadingScreen) {
                    loadingScreen.classList.add("hide");
                }
                const mainContent = document.getElementById("main-content");
                if (mainContent) {
                    mainContent.classList.remove("hide");
                }
            }, 1500); // 1.5s delay for smooth transition
        };
    </script>
